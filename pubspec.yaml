name: tazakar
description: AI-powered voice-first reminder app for Arabic speakers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local database
  sqflite: ^2.3.3
  sqlcipher_flutter_libs: ^0.5.4
  path: ^1.9.0
  path_provider: ^2.1.4

  # Secure key storage
  flutter_secure_storage: ^9.2.2

# Notifications (fully local — no FCM)
  flutter_local_notifications: ^18.0.0
  android_alarm_manager_plus: ^5.0.0
  timezone: ^0.9.4

  # TFLite runtime (Whisper + CAMeL)
  tflite_flutter: ^0.10.4

  # IAP
  in_app_purchase: ^3.2.0

  # Firebase (Remote Config + Crashlytics only)
  firebase_core: ^4.5.0
  firebase_remote_config: ^6.2.0
  firebase_crashlytics: ^5.0.8

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13

  # Testing
  mocktail: ^1.0.4
  fake_async: ^1.3.1

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/fonts/
    - assets/l10n/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
